<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaminoXR | Arcade Persona Lab</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="app">
        <div id="viewport"></div>

        <div class="hud">
            <div class="hud-card">
                <p class="eyebrow">CaminoXR</p>
                <h1>Arcade Persona Lab</h1>
                <p class="hud-copy">
                    A start-to-end <code>Via Crucis</code> route inspired by <code>track_arcade_big</code>,
                    rebuilt as a character playground with wall boundaries and station markers.
                    Walk with <code>WASD</code>, jump with <code>Space</code>, crouch with <code>Ctrl</code>,
                    and click the scene to capture the camera.
                </p>
            </div>

            <div class="status-row">
                <div class="status-pill">
                    <span class="status-label">Persona</span>
                    <strong id="persona-state">Idle</strong>
                </div>
                <div class="status-pill">
                    <span class="status-label">Arena</span>
                    <strong id="arena-status">Loading route…</strong>
                </div>
            </div>
        </div>

        <div class="touch-controls">
            <div class="touch-cluster">
                <button class="control-button" data-action="forward">Forward</button>
                <div class="touch-row">
                    <button class="control-button" data-action="left">Left</button>
                    <button class="control-button" data-action="backward">Back</button>
                    <button class="control-button" data-action="right">Right</button>
                </div>
            </div>

            <div class="touch-cluster touch-actions">
                <button class="control-button accent" data-action="jump">Jump</button>
                <button class="control-button accent-alt" data-action="crouch">Crouch</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
